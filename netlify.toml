# netlify.toml - Place in your frontend root
[build]
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
VITE_API_URL = "https://rtc-pos-backend-production.up.railway.app/"
  NODE_VERSION = "22"
  NPM_CONFIG_PRODUCTION = "false"
  NODE_ENV = "production"

# Handle React Router routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy (if needed)
[[redirects]]
  from = "/api/*"
  to = "https://localhost.com:8000/api/:splat"
  status = 200
  force = true