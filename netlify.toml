# netlify.toml - Place in your frontend root
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

# Handle React Router routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy (if needed)
[[redirects]]
  from = "/api/*"
  to = "https://your-laravel-backend.com/api/:splat"
  status = 200
  force = true